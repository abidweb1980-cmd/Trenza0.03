<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Trenza - Trading Chart</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="./src/index.css" />
    <script type="module" src="./src/renderer.js"></script>
  </head>
  <body>
    <div class="app">
      <div class="topbar">
        <div class="topbar-section">
          <button class="icon-btn" title="Menu"><i class="bi bi-list"></i></button>
          <div class="apple-logo" title="Apple Inc."><i class="bi bi-apple"></i><span>AAPL</span></div>
        </div>
        <div class="topbar-section">
          <button class="icon-btn" title="Add symbol"><i class="bi bi-plus-lg"></i></button>
          <button class="text-btn" title="Timeframe">D</button>
        </div>
        <div class="topbar-section">
          <button class="icon-btn" title="Drawing tools"><i class="bi bi-pencil"></i></button>
          <button class="text-btn" title="Indicators"><i class="bi bi-graph-up-arrow"></i><span>Indicators</span><i class="bi bi-chevron-down chevron"></i></button>
          <button class="icon-btn" title="Layout"><i class="bi bi-grid-3x-gap"></i></button>
        </div>
        <div class="topbar-section">
          <button class="text-btn" title="Alert"><i class="bi bi-cloud-arrow-up"></i><span>Alert</span></button>
          <button class="text-btn" title="Replay"><i class="bi bi-skip-backward-fill"></i><span>Replay</span></button>
        </div>
        <div class="topbar-section">
          <button class="icon-btn" title="Undo"><i class="bi bi-arrow-counterclockwise"></i></button>
          <button class="icon-btn" title="Redo"><i class="bi bi-arrow-clockwise"></i></button>
        </div>
        <div class="spacer"></div>
        <div class="topbar-section no-divider">
          <button class="topbar-select" title="Chart name"><i class="bi bi-layout-split split-icon"></i><span>Unnamed</span><i class="bi bi-chevron-down chevron"></i></button>
        </div>
        <div class="topbar-section no-divider">
          <button class="icon-btn" title="Search"><i class="bi bi-search"></i></button>
          <button class="icon-btn" title="Settings"><i class="bi bi-gear"></i></button>
          <button class="icon-btn" title="Fullscreen"><i class="bi bi-arrows-fullscreen"></i></button>
          <button class="icon-btn" title="Screenshot"><i class="bi bi-camera"></i></button>
          <button class="publish-btn" title="Publish">Publish</button>
        </div>
      </div>
      <div class="main-body">
        <div class="sidebar">
          <button class="sidebar-btn" title="Cursor"><i class="bi bi-crosshair"></i></button>
          <button class="sidebar-btn" id="trendline-tool" data-tool="trendline" title="Trend line"><i class="bi bi-slash-lg"></i></button>
          <button class="sidebar-btn" title="Brush"><i class="bi bi-brush"></i></button>
          <button class="sidebar-btn" title="Path"><i class="bi bi-bezier2"></i></button>
          <button class="sidebar-btn" title="Text"><i class="bi bi-fonts"></i></button>
          <button class="sidebar-btn" title="Pattern"><i class="bi bi-bounding-box"></i></button>
          <button class="sidebar-btn" title="Wave"><i class="bi bi-graph-up"></i></button>
          <button class="sidebar-btn" title="Emoji"><i class="bi bi-emoji-smile"></i></button>
          <button class="sidebar-btn" title="Measure"><i class="bi bi-rulers"></i></button>
          <button class="sidebar-btn" title="Zoom In"><i class="bi bi-zoom-in"></i></button>
          <button class="sidebar-btn" title="Zoom Out"><i class="bi bi-zoom-out"></i></button>
          <div class="sidebar-divider"></div>
          <button class="sidebar-btn" title="Magnet"><i class="bi bi-magnet"></i></button>
          <button class="sidebar-btn" title="Lock"><i class="bi bi-lock"></i></button>
          <button class="sidebar-btn" title="Color picker"><i class="bi bi-eyedropper"></i></button>
          <div class="sidebar-divider"></div>
          <button class="sidebar-btn" title="Delete"><i class="bi bi-trash"></i></button>
          <div class="sidebar-spacer"></div>
          <button class="sidebar-btn" title="Visibility"><i class="bi bi-eye"></i></button>
        </div>
        <div class="chart-area" id="chart-area">
          <div id="chart-container"></div>
          <div class="tool-status" id="tool-status">Click on the chart to place the first point</div>
        </div>
      </div>
    </div>
  </body>
</html>
